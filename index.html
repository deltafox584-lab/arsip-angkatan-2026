<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Arsip Angkatan 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:url("images/background.jpg") center/cover;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.6);

}

.login-box{

    position:relative;

    z-index:10;

    width:380px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    text-align:center;

    color:white;

}

h1{

    margin-bottom:15px;

}

p{

    margin-bottom:25px;

    color:#ddd;

}

input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    margin-bottom:20px;

    font-size:16px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#FFD54F;

    cursor:pointer;

    font-size:17px;

    font-weight:bold;

}

#error{

    color:#ff6b6b;

    margin-top:15px;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="login-box">

<h1>📸 Arsip Angkatan 2026</h1>

<p>Masukkan Kode Akses</p>

<input
type="password"
id="password"
placeholder="Kode Akses">

<button onclick="login()">

Masuk

</button>

<div id="error"></div>

</div>

<script>

function login(){

const password=document.getElementById("password").value;

if(password==="akuntansi206"){

window.location.href="index.html";

}else{

document.getElementById("error").innerHTML="Password Salah!";

}

}

</script>

</body>
</html>
